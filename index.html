    html, body { height: 100%; }

      background-color: #0f172a; /* slate-900 */
      color: #e2e8f0;            /* slate-200 */
      overflow: hidden;          /* 由内部容器滚动，避免整页滚动条 */
    }

    /* 自定义滚动条（webkit 内核） */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* 拖拽悬停高亮态（给上传区用） */
    .drag-active {
      border-color: #38bdf8 !important;
      background-color: rgba(56, 189, 248, 0.08) !important;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    /* 旋转动画（解析中状态指示） */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* 主内容区 Cytoscape 容器（第二阶段启用，第一阶段隐藏） */
    #cy {
      width: 100%;
      height: 100%;
      background-color: #0b1220;
    }

    /* 统计数字强调色 */
    .stat-num { font-variant-numeric: tabular-nums; }
  </style>
</head>

  <script>
    /**
     * 全局数据仓库 —— 跨函数/跨阶段共享的唯一数据源
     * nodes   : Map<id, { id, label, mastered, refs:Set }>
     * edges   : [{ id, source, target, relation }]
     * relations : Set<string>  所有出现过的关系类型
     * questions : [{ id, question, options:[A,B,C,D], answer, kp }]
     * stats   : { nodeCount, edgeCount, questionCount, relationTypes }
     */
    const AppData = {
      cy: null,                  // Cytoscape 实例（Phase 2 新增）
      nodes: new Map(),
      edges: [],
      relations: new Set(),
      questions: [],
      stats: { nodeCount: 0, edgeCount: 0, questionCount: 0, relationTypes: 0 }
    };

    // localStorage 键名常量
    const STORAGE_KEYS = {
      nodes: 'kgraph.nodes',
      edges: 'kgraph.edges',
      relations: 'kgraph.relations',
      questions: 'kgraph.questions'
    };

    // 版本信息
    const APP_VERSION = 'v0.1.0 · Phase 1';

  <!-- ===== 9. Cytoscape 图谱引擎 ===== -->
  <script>
    /**
     * 9.1 全局样式 —— 节点/边/选中态的基础外观
     */
    function buildGlobalStyle() {
      return [
        { selector: 'node', style: {
          'background-color': '#38bdf8',
          'label': 'data(label)',
          'color': '#e2e8f0',
          'font-size': '10px',
          'text-valign': 'bottom',
          'text-margin-y': 4,
          'width': 18, 'height': 18,
          'border-width': 1, 'border-color': '#0ea5e9',
          'text-background-color': '#0f172a',
          'text-background-opacity': 0.8,
          'text-background-padding': 2,
        }},
        { selector: 'edge', style: {
          'width': 1.5,
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': '#94a3b8',
          'line-color': '#94a3b8',
          'opacity': 0.6,
        }},
        { selector: 'node:selected', style: {
          'border-width': 3, 'border-color': '#fbbf24',
          'width': 24, 'height': 24,
        }},
        { selector: 'node.highlight', style: {
          'border-width': 3, 'border-color': '#fbbf24',
          'background-color': '#fbbf24',
        }},
      ];
    }

    /**
     * 9.2 关系类型配色表（高对比度，深色背景可读）
     * 9 种关系类型各分配一种辨识度高的颜色
     */
    const RELATION_COLORS = {
      'is_a':              '#38bdf8', // 青蓝
      'prerequisites_for': '#f59e0b', // 琥珀
      'relates_to':        '#a78bfa', // 紫
      'verifies':          '#34d399', // 翠绿
      'tests_concept':     '#fb7185', // 玫瑰
      'tests_skill':       '#f97316', // 橙
      'appears_in':        '#60a5fa', // 蓝
      'leads_to':          '#facc15', // 黄
      'is_part_of':        '#94a3b8', // 灰
    };

    // 备用色（遇到未知关系类型时自动分配）
    const FALLBACK_COLORS = ['#e879f9', '#22d3ee', '#a3e635', '#fb923c', '#f472b6', '#2dd4bf', '#c084fc', '#fde047'];

    /**
     * 根据 AppData.relations 动态构建 {relation: color} 映射
     */
    function buildRelationColorMap() {
      const colorMap = { ...RELATION_COLORS };
      let fi = 0;
      for (const rel of AppData.relations) {
        if (!colorMap[rel]) {
          colorMap[rel] = FALLBACK_COLORS[fi % FALLBACK_COLORS.length];
          fi++;
        }
      }
      return colorMap;
    }

    /**
     * 9.3 初始化 Cytoscape 实例
     */
    function initCytoscape() {
      const container = document.getElementById('cy');
      AppData.cy = cytoscape({
        container: container,
        elements: [],
        style: buildGlobalStyle(),
        minZoom: 0.1,
        maxZoom: 5,
        wheelSensitivity: 0.3,
        // 大数据集性能优化
        hideEdgesOnViewport: true,
        textureOnViewport: true,
        motionBlur: false,
      });
      return AppData.cy;
    }
  </script>

  <!-- ===== 5. CSV 解析函数 ===== -->
  <script>
    /**
     * 解析知识图谱 CSV（三元组 head/relation/tail）
     * @param {string} text - CSV 文件全文
     * @returns {{ nodes:Array, edges:Array, relations:Array }} 解析结果
     * @throws {Error} 列数不足或内容为空时抛出友好错误
     */
    function parseGraphCSV(text) {
      // 空文件校验
      if (!text || !text.trim()) {
        throw new Error('文件内容为空');
      }

      // Papaparse 启用表头模式解析
      const result = Papa.parse(text, {
        header: true,         // 首行作为字段名
        skipEmptyLines: true, // 跳过空行
        transformHeader: h => h.trim().toLowerCase() // 表头统一小写去空格
      });

      // 解析过程错误（如引号不匹配）
      if (result.errors && result.errors.length > 0) {
        const msg = result.errors[0].message || 'CSV 格式异常';
        throw new Error('CSV 解析失败：' + msg);
      }

      const rows = result.data;
      if (!rows || rows.length === 0) {
        throw new Error('未解析到有效数据行');
      }

      // 列名校验：至少包含 head/relation/tail 三列（兼容中文表头）
      const fields = result.meta.fields || [];
      const hasHead = fields.some(f => ['head', '头节点', 'source', '实体1', '主体'].includes(f));
      const hasRelation = fields.some(f => ['relation', '关系', 'rel', '联系'].includes(f));
      const hasTail = fields.some(f => ['tail', '尾节点', 'target', '实体2', '客体'].includes(f));

      // 若表头无法识别，但列数 >= 3，则按位置推断（第1列=head, 第2列=relation, 第3列=tail）
      const byPosition = !hasHead && !hasRelation && !hasTail && fields.length >= 3;

      if (!hasHead && !hasRelation && !hasTail && !byPosition) {
        throw new Error('CSV 列数不足：需要至少 3 列（head / relation / tail）');
      }

      // 建立字段映射（优先按名称，否则按位置）
      const colHead = byPosition ? fields[0] : fields.find(f => ['head', '头节点', 'source', '实体1', '主体'].includes(f));
      const colRel  = byPosition ? fields[1] : fields.find(f => ['relation', '关系', 'rel', '联系'].includes(f));
      const colTail = byPosition ? fields[2] : fields.find(f => ['tail', '尾节点', 'target', '实体2', '客体'].includes(f));

      // 逐行解析，构建节点与边
      const nodeMap = new Map();
      const edges = [];
      const relations = new Set();
      let edgeId = 0;

      for (const row of rows) {
        const head = (row[colHead] || '').trim();
        const relation = (row[colRel] || '').trim();
        const tail = (row[colTail] || '').trim();

        // 跳过不完整行
        if (!head || !tail || !relation) continue;

        // 节点去重（同名合并）
        if (!nodeMap.has(head)) {
          nodeMap.set(head, { id: head, label: head, mastered: 'none', refs: new Set() });
        }
        if (!nodeMap.has(tail)) {
          nodeMap.set(tail, { id: tail, label: tail, mastered: 'none', refs: new Set() });
        }

        // 收集关系类型
        relations.add(relation);

        // 构建边
        const edge = {
          id: 'e' + (edgeId++),
          source: head,
          target: tail,
          relation: relation
        };
        edges.push(edge);

        // 记录节点被引用的边（便于后续高亮关联）
        nodeMap.get(head).refs.add(edge.id);
        nodeMap.get(tail).refs.add(edge.id);
      }

      if (edges.length === 0) {
        throw new Error('未解析到有效三元组，请检查 CSV 内容');
      }

      return {
        nodes: Array.from(nodeMap.values()),
        edges: edges,
        relations: Array.from(relations)
      };
    }

    /**
     * 解析题库 CSV
     * 期望字段：question, optionA, optionB, optionC, optionD, answer, [knowledge_point]
     * @param {string} text - CSV 文件全文
     * @returns {Array<{id, question, options, answer, kp}>} 标准化题目数组
     * @throws {Error} 列数不足或内容为空时抛出友好错误
     */
    function parseQuestionCSV(text) {
      if (!text || !text.trim()) {
        throw new Error('文件内容为空');
      }

      const result = Papa.parse(text, {
        header: true,
        skipEmptyLines: true,
        transformHeader: h => h.trim().toLowerCase()
      });

      if (result.errors && result.errors.length > 0) {
        const msg = result.errors[0].message || 'CSV 格式异常';
        throw new Error('CSV 解析失败：' + msg);
      }

      const rows = result.data;
      if (!rows || rows.length === 0) {
        throw new Error('未解析到有效数据行');
      }

      const fields = result.meta.fields || [];

      // 字段名映射（兼容中英文）
      const findCol = (names) => fields.find(f => names.includes(f));

      const colQ   = findCol(['question', '题目', '题干', 'question_content']);
      const colA   = findCol(['optiona', 'option_a', 'a', '选项a', '选项A']);
      const colB   = findCol(['optionb', 'option_b', 'b', '选项b', '选项B']);
      const colC   = findCol(['optionc', 'option_c', 'c', '选项c', '选项C']);
      const colD   = findCol(['optiond', 'option_d', 'd', '选项d', '选项D']);
      const colAns = findCol(['answer', '答案', 'correct', 'correct_answer']);
      const colKP  = findCol(['knowledge_point', 'knowledgepoint', 'kp', '知识点', '关联知识点', 'node']);

      // 必须字段：题目 + 至少 A/B/C 三个选项 + 答案
      if (!colQ || !colA || !colB || !colC || !colAns) {
        throw new Error('题库 CSV 列数不足：至少需要 题目/选项A/选项B/选项C/答案 共 5 列');
      }

      const questions = [];
      let qid = 0;

      for (const row of rows) {
        const q = (row[colQ] || '').trim();
        const a = (row[colA] || '').trim();
        const b = (row[colB] || '').trim();
        const c = (row[colC] || '').trim();
        const d = colD ? (row[colD] || '').trim() : '';
        const ans = (row[colAns] || '').trim().toUpperCase();
        const kp = colKP ? (row[colKP] || '').trim() : '';

        // 跳过不完整行
        if (!q || !a || !b || !c || !ans) continue;

        // 答案校验（仅接受 A/B/C/D）
        if (!['A', 'B', 'C', 'D'].includes(ans)) {
          console.warn('跳过答案无效的题目：' + q.slice(0, 30) + '...');
          continue;
        }

        questions.push({
          id: 'q' + (qid++),
          question: q,
          options: { A: a, B: b, C: c, D: d },
          answer: ans,
          kp: kp   // 关联知识点（可选，用于后续跳转）
        });
      }

      if (questions.length === 0) {
        throw new Error('未解析到有效题目，请检查 CSV 内容');
      }

      return questions;
    }
  </script>

  <!-- ===== 6. UI 渲染函数 ===== -->
  <script>
    /**
     * 更新侧边栏 + 底部状态栏的统计数字
     */
    function updateStats() {
      const s = AppData.stats;
      // 侧边栏统计卡片
      document.getElementById('statNodes').textContent = s.nodeCount;
      document.getElementById('statEdges').textContent = s.edgeCount;
      document.getElementById('statQuestions').textContent = s.questionCount;
      document.getElementById('statRelations').textContent = s.relationTypes;
      // 底部状态栏
      document.getElementById('footNodes').textContent = s.nodeCount;
      document.getElementById('footEdges').textContent = s.edgeCount;
      document.getElementById('footQuestions').textContent = s.questionCount;
    }

    /**
     * 更新底部状态栏文本
     * @param {string} text - 状态描述
     * @param {'info'|'success'|'error'} type - 状态类型（控制颜色）
     */
    function setStatus(text, type = 'info') {
      const el = document.getElementById('statusText');
      el.textContent = text;
      // 根据类型切换颜色
      el.className = {
        info: 'text-slate-400',
        success: 'text-emerald-400',
        error: 'text-rose-400'
      }[type] || 'text-slate-400';
    }

    /**
     * 设置上传区的状态徽章
     * @param {'graph'|'question'} type - 上传区类型
     * @param {'loading'|'success'|'error'} state - 状态
     * @param {string} message - 显示文案
     */
    function setUploadBadge(type, state, message) {
      const badge = document.getElementById(type + 'Badge');
      const label = document.getElementById(type + 'Label');
      badge.classList.remove('hidden', 'bg-emerald-500/20', 'text-emerald-400', 'bg-rose-500/20', 'text-rose-400', 'bg-brand-500/20', 'text-brand-400');

      if (state === 'loading') {
        badge.textContent = '⏳ ' + message;
        badge.classList.add('bg-brand-500/20', 'text-brand-400');
      } else if (state === 'success') {
        badge.textContent = '✓ ' + message;
        badge.classList.add('bg-emerald-500/20', 'text-emerald-400');
      } else if (state === 'error') {
        badge.textContent = '✗ ' + message;
        badge.classList.add('bg-rose-500/20', 'text-rose-400');
      }
      badge.classList.remove('hidden');
    }

    /**
     * 隐藏上传区徽章
     * @param {'graph'|'question'} type
     */
    function clearUploadBadge(type) {
      document.getElementById(type + 'Badge').classList.add('hidden');
    }

    /**
     * 将数据持久化到 localStorage
     */
    function persistToStorage() {
      try {
        // Map → 普通数组序列化
        localStorage.setItem(STORAGE_KEYS.nodes, JSON.stringify(AppData.nodes.map(n => ({
          ...n, refs: Array.from(n.refs)
        }))));
        localStorage.setItem(STORAGE_KEYS.edges, JSON.stringify(AppData.edges));
        localStorage.setItem(STORAGE_KEYS.relations, JSON.stringify(Array.from(AppData.relations)));
        localStorage.setItem(STORAGE_KEYS.questions, JSON.stringify(AppData.questions));
      } catch (e) {
        console.warn('localStorage 写入失败（可能是隐私模式或存储已满）：', e);
      }
    }
  </script>

  <!-- ===== 7. 事件绑定 ===== -->
  <script>
    /**
     * 处理知识图谱 CSV 文件上传
     * @param {File} file
     */
    async function handleGraphFile(file) {
      setUploadBadge('graph', 'loading', '解析中…');
      setStatus('正在解析知识图谱 CSV…', 'info');

      try {
        // 读取文件文本
        const text = await file.text();
        // 解析
        const { nodes, edges, relations } = parseGraphCSV(text);

        // 写入全局仓库
        AppData.nodes.clear();
        nodes.forEach(n => AppData.nodes.set(n.id, n));
        AppData.edges = edges;
        AppData.relations = new Set(relations);
        AppData.stats = {
          nodeCount: nodes.length,
          edgeCount: edges.length,
          questionCount: AppData.stats.questionCount,
          relationTypes: relations.length
        };

        // 持久化
        persistToStorage();

        // 控制台输出（便于调试）
        console.log('[知识图谱] 解析完成 ✓');
        console.log('  节点数：', nodes.length);
        console.log('  边数：', edges.length);
        console.log('  关系类型：', relations);
        console.log('  节点数组：', nodes);
        console.log('  边数组：', edges);

        // UI 更新
        updateStats();
        setUploadBadge('graph', 'success', file.name);
        setStatus('知识图谱加载成功：' + nodes.length + ' 节点 / ' + edges.length + ' 边', 'success');
      } catch (err) {
        console.warn('[知识图谱] 解析失败：', err.message);
        setUploadBadge('graph', 'error', err.message);
        setStatus('知识图谱加载失败：' + err.message, 'error');
      }
    }

    /**
     * 处理题库 CSV 文件上传
     * @param {File} file
     */
    async function handleQuestionFile(file) {
      setUploadBadge('question', 'loading', '解析中…');
      setStatus('正在解析题库 CSV…', 'info');

      try {
        const text = await file.text();
        const questions = parseQuestionCSV(text);

        // 写入全局仓库
        AppData.questions = questions;
        AppData.stats.questionCount = questions.length;

        // 持久化
        persistToStorage();

        // 控制台输出
        console.log('[题库] 解析完成 ✓');
        console.log('  题目数：', questions.length);
        console.log('  题目数组：', questions);

        // UI 更新
        updateStats();
        setUploadBadge('question', 'success', file.name);
        setStatus('题库加载成功：' + questions.length + ' 道题目', 'success');
      } catch (err) {
        console.warn('[题库] 解析失败：', err.message);
        setUploadBadge('question', 'error', err.message);
        setStatus('题库加载失败：' + err.message, 'error');
      }
    }

    /**
     * 为单个上传区绑定事件（点击 + 拖拽）
     * @param {string} dropZoneId - 拖拽区域元素 ID
     * @param {'graph'|'question'} type - 上传类型
     */
    function bindUploadZone(dropZoneId, type) {
      const zone = document.getElementById(dropZoneId);
      const input = zone.querySelector('input[type="file"]');

      // 点击上传
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (type === 'graph') handleGraphFile(file);
        else handleQuestionFile(file);
        // 清空 input，允许重复上传同一文件
        input.value = '';
      });

      // 拖拽事件
      ['dragenter', 'dragover'].forEach(evt => {
        zone.addEventListener(evt, (e) => {
          e.preventDefault();
          e.stopPropagation();
          zone.classList.add('drag-active');
        });
      });

      ['dragleave', 'drop'].forEach(evt => {
        zone.addEventListener(evt, (e) => {
          e.preventDefault();
          e.stopPropagation();
          zone.classList.remove('drag-active');
        });
      });

      zone.addEventListener('drop', (e) => {
        const file = e.dataTransfer.files[0];
        if (!file) return;
        if (type === 'graph') handleGraphFile(file);
        else handleQuestionFile(file);
      });
    }
  </script>

  <!-- ===== 8. 初始化入口 ===== -->
